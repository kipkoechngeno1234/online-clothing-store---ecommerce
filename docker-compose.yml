version: '3.9'

services:
  db:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: onlinestore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - db_data:/var/lib/postgresql/data

  web:
    build: .
    command: sh -c "python manage.py migrate --noinput && gunicorn onlinestore.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      PYTHONUNBUFFERED: "1"
      DJANGO_SECRET_KEY: "django-insecure-unsafe-dev-key"
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: "0.0.0.0 localhost"
      POSTGRES_DB: onlinestore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    depends_on:
      - db

volumes:
  db_data:
